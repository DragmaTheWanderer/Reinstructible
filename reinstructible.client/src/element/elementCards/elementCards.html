<div class="element-body">
 @for (cardGroup of elementCards; track cardGroup) {
  <div>
   <div>
    <h2>{{ cardGroup.grouping }}</h2>
   </div>
   <div class="w3-row">
    @for (element of cardGroup.elements; track element) {
     <span>
      <elementCard [element]="element" (itemForStorage)="setStorage($event)"></elementCard>
     </span>
    }
   </div>
  </div>
 }
</div>
