<!--Tab Header-->
<div class="w3-grid" style="grid-template-columns: auto auto auto auto">
  <div>
    <a href="javascript:void(0)" (click)="openControlTab(filterOptionGroups.categoryOptionType)">
      <div class="tablink w3-bottombar w3-hover-light-grey w3-padding"
           [ngClass]="borderColor(filterOptionGroups.categoryOptionType)">
        Category
      </div>
    </a>
  </div>
  <div>
    <a href="javascript:void(0)" (click)="openControlTab(filterOptionGroups.colorOptionType)">
      <div class="tablink w3-bottombar w3-hover-light-grey w3-padding"
           [ngClass]="borderColor(filterOptionGroups.colorOptionType)">
        Color
      </div>
    </a>
  </div>
  <div>
    <a href="javascript:void(0)" (click)="openControlTab(filterOptionGroups.storageOptionType)">
      <div class="tablink w3-bottombar w3-hover-light-grey w3-padding"
           [ngClass]="borderColor(filterOptionGroups.storageOptionType)">
        Storage
      </div>
    </a>
  </div>
  <div>
    <a href="javascript:void(0)" (click)="openControlTab(filterOptionGroups.subBuildOptionType)">
      <div class="tablink w3-bottombar w3-hover-light-grey w3-padding"
           [ngClass]="borderColor(filterOptionGroups.subBuildOptionType)">
        Sub-Build
      </div>
    </a>
  </div>
  
</div>

<!--Body-->
<div class="w3-container element-controll-container">
  <div class="w3-container">

    @switch (selectedControllTab()) {
    @case (filterOptionGroups.categoryOptionType) {
    <cardComponent [options]="filterOptionGroups.partCategoryOptions"
                   [filterType]="filterOptionGroups.categoryOptionType"
                   (onOptionsSent)="filter($event)"></cardComponent>

    }
    @case (filterOptionGroups.colorOptionType) {
    <cardComponent [options]="filterOptionGroups.partColorOptions"
                   [filterType]="filterOptionGroups.colorOptionType"
                   (onOptionsSent)="filter($event)"></cardComponent>

    }
    @case (filterOptionGroups.storageOptionType) {
    <cardComponent [options]="filterOptionGroups.partStorageOptions"
                   [filterType]="filterOptionGroups.storageOptionType"
                   (onOptionsSent)="filter($event)"></cardComponent>

    }

    @case (filterOptionGroups.subBuildOptionType) {
    <cardComponent [options]="filterOptionGroups.subBuildOptions"
                   [filterType]="filterOptionGroups.subBuildOptionType"
                   (onOptionsSent)="filter($event)"></cardComponent>

    }
    }
  </div>
</div>
  <!--Controlls-->
  <div class="w3-container">
      <span class="w3-display-bottommiddle element-footer">
        <span class="w3-left">
          <app-button icon="fa-regular fa-square-check"
                      color="w3-dark-grey"
                      toolTip="Select All"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="selectAll()">
          </app-button>
          <app-button icon="fa-regular fa-square-full"
                      color="w3-dark-grey"
                      toolTip="Clear"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="clearSelections()">
          </app-button>
          <app-button icon="fa-regular fa-eye-slash"
                      color="w3-dark-grey"
                      toolTip="Toggle"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="toggleSelections()">
          </app-button>
          <app-button icon="fa-regular fa-share-from-square"
                      color="w3-dark-grey"
                      toolTip="{{ currentGroupText }}"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="toggleGrouping()">
          </app-button>

          <app-button icon="fa-solid fa-floppy-disk"
                      color="w3-light-blue"
                      toolTip="Save Current"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="fileSave()">
          </app-button>
          <app-button icon="fa-regular fa-floppy-disk"
                      color="w3-light-blue"
                      toolTip="Load currently working on"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="fileLoad()">
          </app-button>
          <app-button icon="fa-solid fa-magnifying-glass-plus"
                      color="w3-green"
                      toolTip="Set Sub-build"
                      toolTipClass="btn-tooltip-left"
                      (clickEvent)="setSubBuild()">
          </app-button>
        </span>
        <span class="w3-right">
          <app-button
            icon="fa-regular fa-clipboard"
            color="w3-dark-grey"
            toolTip="Card View"
            toolTipClass="btn-tooltip-right"
            (clickEvent)="setDisplayMode(enumDisplayMode.CV)"
          >
          </app-button>
          <app-button
            icon="fa-solid fa-border-all"
            color="w3-dark-grey"
            toolTip="Table View"
            toolTipClass="btn-tooltip-right"
            (clickEvent)="setDisplayMode(enumDisplayMode.TV)"
          >
          </app-button>
        </span>
      </span>

  </div>
