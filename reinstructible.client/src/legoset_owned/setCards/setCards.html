<div class="set-body">
 @for (cardGroup of legoSetCards; track cardGroup) {
  <div>
   <div>{{ cardGroup.grouping }}</div>
   <div class="w3-row">
    @for (legoSet of cardGroup.legoSets; track legoSet) {
     <span>
      <setCard [legoSet]="legoSet" (legoSetOut)="loadSet($event)"></setCard>
     </span>
    }
   </div>
  </div>
 }
</div>
